name: FluxTrainingHost
options:
  minimumXcodeGenVersion: 2.38.0
  deploymentTarget:
    iOS: 17.0
packages:
  FluxTraining:
    path: ../ios
targets:
  FluxTrainingHost:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.flux.training.host
        PRODUCT_NAME: FluxTrainingHost
        SWIFT_VERSION: 6.0
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: FluxTrainingHost
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
    dependencies:
      - package: FluxTraining
        product: FluxTraining
schemes:
  FluxTrainingHost:
    build:
      targets:
        FluxTrainingHost: all
    run:
      config: Debug
    archive:
      config: Release
